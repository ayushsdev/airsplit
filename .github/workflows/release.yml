name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore entitlements
        run: |
          cat > AirSplit/Resources/AirSplit.entitlements << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <true/>
              <key>com.apple.security.device.audio-input</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Build
        run: |
          xcodebuild -project AirSplit.xcodeproj \
            -scheme AirSplit \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AirSplit.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }}

      - name: Export
        run: |
          cat > $RUNNER_TEMP/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AirSplit.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$RUNNER_TEMP/export/AirSplit.app" $RUNNER_TEMP/AirSplit.zip

          xcrun notarytool submit $RUNNER_TEMP/AirSplit.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/AirSplit.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "AirSplit" \
            -srcfolder "$RUNNER_TEMP/export/AirSplit.app" \
            -ov -format UDZO \
            $RUNNER_TEMP/AirSplit-${{ github.ref_name }}.dmg

      - name: Create zip
        run: |
          cd $RUNNER_TEMP/export
          ditto -c -k --keepParent AirSplit.app $RUNNER_TEMP/AirSplit-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/AirSplit-${{ github.ref_name }}.dmg
            ${{ runner.temp }}/AirSplit-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain
